<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp Active</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#050505;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    color:white;
}

/* خلفية متوهجة */
body::before{
    content:"";
    position:absolute;
    width:350px;
    height:350px;
    background:#00ff5530;
    border-radius:50%;
    filter:blur(120px);
}

.card{
    position:relative;
    z-index:1;
    width:90%;
    max-width:380px;
    background:#111;
    border:1px solid rgba(255,255,255,.08);
    border-radius:28px;
    padding:30px 25px;
    text-align:center;
    box-shadow:0 0 40px rgba(0,255,100,.15);
}

.logo{
    width:90px;
    height:90px;
    margin:0 auto 15px;
}

.logo img{
    width:100%;
    filter:drop-shadow(0 0 15px #00ff66);
}

h1{
    font-size:38px;
    margin-bottom:10px;
}

.desc{
    color:#cfcfcf;
    line-height:1.8;
    margin-bottom:30px;
}

.active-btn{
    width:100%;
    height:70px;
    border:none;
    border-radius:18px;
    background:linear-gradient(90deg,#00b33c,#00ff66);
    color:white;
    font-size:30px;
    font-weight:bold;
    box-shadow:0 0 25px rgba(0,255,100,.7);
}

.status{
    margin-top:20px;
    color:#00ff66;
    font-size:22px;
    font-weight:bold;
}

.clock{
    margin-top:25px;
    background:#1a1a1a;
    border-radius:18px;
    padding:18px;
}

#time{
    font-size:32px;
    font-weight:bold;
}

#date{
    margin-top:8px;
    color:#bbb;
}

.version{
    margin-top:20px;
    color:#777;
    font-size:14px;
}
</style>
</head>

<body>

<div class="card">

    <div class="logo">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
    </div>

    <h1>WhatsApp Active</h1>

    <div class="desc">
        تطبيق WhatsApp Active للمساعدة في إدارة بعض مشكلات واتساب المعدل
    </div>

    <button class="active-btn">
        ACTIVE ✓
    </button>

    <div class="status">
        Connected ✅
    </div>

    <div class="clock">
        <div id="time"></div>
        <div id="date"></div>
    </div>

    <div class="version">
        Version 2.6.0
    </div>

</div>

<script>
function updateClock() {
    const now = new Date();

    document.getElementById("time").innerText =
        now.toLocaleTimeString("ar-EG");

    document.getElementById("date").innerText =
        now.toLocaleDateString("ar-EG", {
            weekday: "long",
            year: "numeric",
            month: "long",
            day: "numeric"
        });
}

updateClock();
setInterval(updateClock, 1000);
</script>

</body>
</html>
