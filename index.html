<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Active Panel</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
    font-family:Arial,sans-serif;
}

#btn{
    width:220px;
    height:70px;
    border:none;
    border-radius:15px;
    background:#ff0000;
    color:white;
    font-size:28px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 0 20px rgba(255,0,0,.6);
}

#btn.active{
    background:#00aa00;
    box-shadow:0 0 20px rgba(0,255,0,.6);
}
</style>
</head>

<body>

<button id="btn">Active</button>

<script>
const btn = document.getElementById("btn");

btn.addEventListener("click", () => {
    btn.classList.toggle("active");

    if (btn.classList.contains("active")) {
        btn.textContent = "Actived";
    } else {
        btn.textContent = "Active";
    }
});
</script>

</body>
</html>
