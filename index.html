<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WhatsApp Active</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    radial-gradient(circle at top,#1a1a1a,#050505 70%);
    overflow:hidden;
}

body::before{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:#00ff6a22;
    border-radius:50%;
    filter:blur(120px);
    animation:move 8s infinite alternate;
}

@keyframes move{
    from{transform:translate(-150px,-100px);}
    to{transform:translate(150px,100px);}
}

.panel{
    position:relative;
    z-index:1;
    width:90%;
    max-width:420px;
    padding:35px;
    border-radius:28px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.1);
    text-align:center;
    color:white;
    box-shadow:0 0 40px rgba(0,0,0,.5);
}

.logo{
    font-size:70px;
    margin-bottom:10px;
}

.title{
    font-size:28px;
    font-weight:bold;
}

.desc{
    margin-top:12px;
    color:#d0d0d0;
    line-height:1.8;
    margin-bottom:35px;
}

#btn{
    width:230px;
    height:75px;
    border:none;
    border-radius:18px;
    font-size:28px;
    font-weight:bold;
    color:white;
    cursor:pointer;
    background:linear-gradient(90deg,#ff2b2b,#ff5a5a);
    box-shadow:0 0 25px rgba(255,0,0,.6);
    transition:.4s;
}

#btn:hover{
    transform:scale(1.05);
}

#btn.active{
    background:linear-gradient(90deg,#00a83a,#00ff66);
    box-shadow:0 0 30px rgba(0,255,100,.8);
}

.status{
    margin-top:25px;
    font-size:18px;
}

#statusText{
    color:#ff5555;
    font-weight:bold;
}

.datetime{
    margin-top:30px;
    padding:15px;
    border-radius:16px;
    background:rgba(255,255,255,.05);
}

#time{
    font-size:30px;
    font-weight:bold;
}

#date{
    margin-top:8px;
    color:#ccc;
}

.version{
    margin-top:20px;
    color:#888;
    font-size:14px;
}
</style>
</head>

<body>

<div class="panel">

    <div class="logo">🟢</div>

    <div class="title">
        WhatsApp Active
    </div>

    <div class="desc">
        تطبيق WhatsApp Active للمساعدة في إدارة بعض مشكلات واتساب المعدل
    </div>

    <button id="btn">ACTIVE</button>

    <div class="status">
        Status:
        <span id="statusText">Disconnected ❌</span>
    </div>

    <div class="datetime">
        <div id="time"></div>
        <div id="date"></div>
    </div>

    <div class="version">
        Version 2.6.0
    </div>

</div>

<script>
const btn = document.getElementById("btn");
const statusText = document.getElementById("statusText");

btn.onclick = () => {

    btn.classList.toggle("active");

    if(btn.classList.contains("active")){

        btn.innerText = "ACTIVATED";
        statusText.innerText = "Connected ✅";
        statusText.style.color = "#00ff66";

    }else{

        btn.innerText = "ACTIVE";
        statusText.innerText = "Disconnected ❌";
        statusText.style.color = "#ff5555";
    }
};

function updateTime(){

    const now = new Date();

    time.innerText = now.toLocaleTimeString("ar-EG");

    date.innerText = now.toLocaleDateString("ar-EG",{
        weekday:"long",
        year:"numeric",
        month:"long",
        day:"numeric"
    });
}

updateTime();
setInterval(updateTime,1000);
</script>

</body>
</html>
